<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevS&O — Painel Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #09090b; --surface: #18181b; --card: #1e1e24;
            --border: rgba(255,255,255,0.08); --text: #fafafa;
            --text-dim: #71717a; --primary: #6366f1;
            --accent: #a78bfa; --danger: #ef4444; --success: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; flex-direction: column; gap: 20px;
        }
        .login-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
        }
        .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .login-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 12px 16px; background: var(--card);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-size: 14px; font-family: inherit;
            outline: none; margin-bottom: 12px;
        }
        .login-box input:focus { border-color: var(--primary); }
        .login-box button {
            width: 100%; padding: 12px; background: var(--primary);
            border: none; border-radius: 10px; color: #fff;
            font-size: 14px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: opacity 0.2s;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-err { color: var(--danger); font-size: 12px; margin-top: 8px; display: none; }

        .admin-panel { display: none; }
        .admin-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--surface); position: sticky; top: 0; z-index: 50;
        }
        .admin-header h2 { font-size: 16px; font-weight: 700; }
        .admin-header-actions { display: flex; gap: 10px; align-items: center; }
        .btn {
            padding: 8px 18px; border-radius: 8px; font-size: 13px;
            font-weight: 600; border: none; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-outline { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn:hover { opacity: 0.85; }
        .btn-publish { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-size: 14px; padding: 10px 24px; }

        .tabs {
            display: flex; gap: 0; border-bottom: 1px solid var(--border);
            background: var(--surface); padding: 0 24px; overflow-x: auto;
        }
        .tab {
            padding: 14px 20px; font-size: 13px; font-weight: 500;
            color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.2s; white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .editor-area {
            max-width: 900px; margin: 0 auto; padding: 32px 24px;
        }
        .editor-area.wide { max-width: 1100px; }
        .section-block {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 28px; margin-bottom: 20px;
        }
        .section-block h3 {
            font-size: 15px; font-weight: 700; margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input, .field textarea, .field select {
            width: 100%; padding: 10px 14px; background: var(--card);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-size: 14px; font-family: inherit;
            outline: none; transition: border-color 0.2s;
        }
        .field input:focus, .field textarea:focus { border-color: var(--primary); }
        .field textarea { resize: vertical; min-height: 80px; }

        .features-list { display: flex; flex-direction: column; gap: 12px; }
        .feature-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; position: relative;
        }
        .feature-item .remove-btn {
            position: absolute; top: 10px; right: 10px;
            background: var(--danger); color: #fff; border: none;
            border-radius: 6px; width: 24px; height: 24px; cursor: pointer;
            font-size: 12px; display: flex; align-items: center; justify-content: center;
        }
        .feature-item .field { margin-bottom: 10px; }
        .feature-item .field:last-child { margin-bottom: 0; }

        .image-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px; margin-top: 12px;
        }
        .image-slot {
            aspect-ratio: 16/10; background: var(--card); border: 2px dashed var(--border);
            border-radius: 10px; overflow: hidden; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s; position: relative;
        }
        .image-slot:hover { border-color: var(--primary); }
        .image-slot img { width: 100%; height: 100%; object-fit: cover; }
        .image-slot .remove-img {
            position: absolute; top: 6px; right: 6px;
            background: rgba(0,0,0,0.7); color: #fff; border: none;
            border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
            font-size: 11px; display: flex; align-items: center; justify-content: center;
        }
        .image-slot .placeholder-text {
            font-size: 12px; color: var(--text-dim); text-align: center;
        }
        .image-slot .add-icon { font-size: 28px; color: var(--text-dim); }

        .slider-preview {
            margin-top: 16px; border-radius: 12px; overflow: hidden;
            background: var(--card); position: relative; aspect-ratio: 16/7;
        }
        .slider-preview img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 0.5s;
        }
        .slider-preview img.active { opacity: 1; }
        .slider-dots {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 6px;
        }
        .slider-dots .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.3); cursor: pointer;
        }
        .slider-dots .dot.active { background: #fff; }

        .save-indicator {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 10px;
            font-size: 13px; display: none; align-items: center; gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .save-indicator.show { display: flex; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

        .db-search-box { display:flex; gap:10px; margin-bottom:20px; }
        .db-search-box input { flex:1; padding:12px 16px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:inherit; outline:none; }
        .db-search-box input:focus { border-color:var(--primary); }
        .db-search-box button { padding:12px 20px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-family:inherit; white-space:nowrap; }
        .db-ai-response { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:20px; font-size:13px; line-height:1.6; color:var(--text); display:none; }
        .db-ai-response pre { background:var(--surface); padding:12px; border-radius:8px; margin-top:8px; overflow-x:auto; font-size:12px; white-space:pre-wrap; }
        .db-stats { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
        .db-stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 20px; flex:1; min-width:140px; }
        .db-stat .label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
        .db-stat .value { font-size:20px; font-weight:700; color:var(--primary); }
        .db-tree { font-family:'Fira Code',monospace; font-size:13px; }
        .db-node { margin-left:20px; border-left:1px solid var(--border); padding-left:12px; margin-top:4px; }
        .db-node-header { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:6px; cursor:pointer; transition:background 0.15s; }
        .db-node-header:hover { background:var(--card); }
        .db-node-key { font-weight:600; color:var(--accent); }
        .db-node-type { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; text-transform:uppercase; }
        .db-type-string { background:rgba(34,197,94,0.15); color:#22c55e; }
        .db-type-number { background:rgba(59,130,246,0.15); color:#3b82f6; }
        .db-type-boolean { background:rgba(245,158,11,0.15); color:#f59e0b; }
        .db-type-object { background:rgba(168,85,247,0.15); color:#a855f7; }
        .db-type-array { background:rgba(236,72,153,0.15); color:#ec4899; }
        .db-type-null { background:rgba(113,113,122,0.15); color:#71717a; }
        .db-node-value { font-size:12px; color:var(--text-dim); max-width:400px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .db-node-meta { font-size:10px; color:var(--text-dim); margin-left:auto; white-space:nowrap; }
        .db-edit-btn { font-size:10px; padding:2px 8px; background:var(--primary); color:#fff; border:none; border-radius:4px; cursor:pointer; opacity:0; transition:opacity 0.15s; }
        .db-node-header:hover .db-edit-btn { opacity:1; }
        .db-edit-input { background:var(--card); border:1px solid var(--primary); border-radius:6px; color:var(--text); font-size:13px; font-family:inherit; padding:4px 8px; outline:none; }
        .db-root-toggle { font-size:12px; padding:4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; cursor:pointer; color:var(--text-dim); margin-bottom:12px; display:inline-block; }

        input[type="file"] { display: none; }

        @media (max-width: 700px) {
            .editor-area { padding: 16px; }
            .section-block { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h1>🔧 DevS&O</h1>
        <p>Painel de administração do site</p>
        <input type="password" id="login-pass" placeholder="Palavra-passe de admin" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">Entrar</button>
        <div class="login-err" id="login-err"></div>
    </div>
</div>

<!-- ADMIN -->
<div class="admin-panel" id="admin-panel">
    <div class="admin-header">
        <h2>🔧 DevS&O — Editor do Site</h2>
        <div class="admin-header-actions">
            <button class="btn btn-outline" onclick="window.open('/index.html','_blank')">👁️ Ver Site</button>
            <button class="btn btn-publish" onclick="publishAll()">🚀 Publicar Alterações</button>
        </div>
    </div>

    <div class="tabs" id="admin-tabs">
        <div class="tab" data-tab="hero" onclick="switchTab('hero')">🏠 Hero</div>
        <div class="tab" data-tab="design" onclick="switchTab('design')">🎨 Design</div>
        <div class="tab" data-tab="features" onclick="switchTab('features')">✨ Funcionalidades</div>
        <div class="tab" data-tab="extensions" onclick="switchTab('extensions')">🧩 Extensões</div>
        <div class="tab" data-tab="gallery" onclick="switchTab('gallery')">🖼️ Galeria</div>
        <div class="tab" data-tab="footer" onclick="switchTab('footer')">📝 Textos</div>
        <div class="tab" data-tab="codigos" onclick="switchTab('codigos')">🔑 Códigos</div>
        <div class="tab" data-tab="prompts" onclick="switchTab('prompts')">🖼️ Prompts Imagens</div>
        <div class="tab" data-tab="pedidos" onclick="switchTab('pedidos')" style="position:relative;">🛒 Pedidos <span id="pedidos-badge" style="display:none;background:var(--danger);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px;font-weight:700;"></span></div>
        <div class="tab" data-tab="database" onclick="switchTab('database')">📊 Base de Dados</div>
    </div>

    <div class="editor-area" id="editor-content"></div>
</div>

<div class="save-indicator" id="save-indicator">✅ Guardado</div>

<input type="file" id="image-upload" accept="image/*" multiple>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyCEZO2Haz9W2OFmecNJG2wk6nicjpQvTTI",
    authDomain: "s123o-f3e37.firebaseapp.com",
    databaseURL: "https://s123o-f3e37-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "s123o-f3e37",
    storageBucket: "s123o-f3e37.firebasestorage.app",
    messagingSenderId: "714841609825",
    appId: "1:714841609825:web:9a229c4679b11fdf1cbc20"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let siteData = {};
let currentTab = 'hero';
let uploadCallback = null;

const DEFAULT_DATA = {
    hero: {
        badge: "v2.0 — 2026",
        title: "O Workspace Escolar\ndefinitivo",
        subtitle: "Notas, provas, chat, videochamadas, IDE, editor de documentos, desenho, IA integrada e muito mais — tudo num só sítio.",
        ctaText: "Descarregar para Windows",
        ctaLink: "#download",
        secondaryText: "Saber mais",
        secondaryLink: "#features"
    },
    features: [
        { icon: "📊", title: "Notas e Provas", desc: "Regista notas, cria provas com questões, corrige automaticamente com IA e acompanha o teu desempenho." },
        { icon: "💬", title: "Chat e Videochamadas", desc: "Chat em tempo real com a turma e videochamadas integradas via Jitsi — sem contas extras." },
        { icon: "🤖", title: "Estúdio IA", desc: "Chat com IA, geração de imagens, análise de documentos, escrita criativa, tradutor e muito mais." },
        { icon: "💻", title: "IDE de Código", desc: "Escreve e executa código Python, JavaScript, HTML, CSS, Java e C++ diretamente no browser." },
        { icon: "📝", title: "Office Integrado", desc: "Editor de texto (Word), folhas de cálculo (Excel) e apresentações (PowerPoint) built-in." },
        { icon: "🎵", title: "Estudar com Música", desc: "Spotify integrado e recomendações de IA para encontrares a playlist perfeita para estudar." }
    ],
    gallery: [],
    footer: {
        title: "Feito para escolas",
        subtitle: "Interface moderna, escura e sem distrações",
        copyright: "S&O+ Ultra Workspace © 2026 • Feito com ❤️ para escolas portuguesas",
        downloadText: "Pronto para começar?",
        downloadSub: "Descarrega o instalador e tem o workspace a funcionar em menos de 1 minuto.",
        downloadBtn: "Descarregar v2.0 (~2MB)",
        downloadLink: "https://github.com/franciscoaura93-spec/soplus-workspace/releases/download/v2.0/S%2BO-Workspace-Instalador.exe",
        downloadInfo: "Windows 10/11 • Python instalado automaticamente • Grátis para sempre"
    }
};

function doLogin() {
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-err');
    if (pass === 's&oadm') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadAdmin();
    } else {
        errEl.textContent = 'Palavra-passe incorreta';
        errEl.style.display = 'block';
    }
}

async function loadAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    const snap = await db.ref('site_content').once('value');
    siteData = snap.val() || JSON.parse(JSON.stringify(DEFAULT_DATA));
    if (!siteData.features) siteData.features = DEFAULT_DATA.features;
    if (!siteData.gallery) siteData.gallery = [];
    if (!siteData.footer) siteData.footer = DEFAULT_DATA.footer;
    renderTab();
    listenPedidos();
    updatePedidosBadge();
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    renderTab();
}

function renderTab() {
    const area = document.getElementById('editor-content');
        switch(currentTab) {
        case 'hero': renderHeroEditor(area); break;
        case 'design': renderDesignEditor(area); break;
        case 'features': renderFeaturesEditor(area); break;
        case 'gallery': renderGalleryEditor(area); break;
        case 'footer': renderFooterEditor(area); break;
        case 'codigos': renderCodigos(area); break;
        case 'prompts': renderPrompts(area); break;
        case 'extensions': renderExtensions(area); break;
        case 'pedidos': renderPedidos(area); break;
        case 'database': renderDatabase(area); break;
    }
}

function renderHeroEditor(area) {
    const h = siteData.hero || DEFAULT_DATA.hero;
    area.innerHTML = `
        <div class="section-block">
            <h3>🏠 Secção Hero (topo do site)</h3>
            <div class="field"><label>Badge</label><input value="${esc(h.badge)}" onchange="siteData.hero.badge=this.value"></div>
            <div class="field"><label>Título (usa \n para quebra de linha)</label><textarea onchange="siteData.hero.title=this.value">${esc(h.title)}</textarea></div>
            <div class="field"><label>Subtítulo</label><textarea onchange="siteData.hero.subtitle=this.value">${esc(h.subtitle)}</textarea></div>
            <div class="field"><label>Texto Botão Principal</label><input value="${esc(h.ctaText)}" onchange="siteData.hero.ctaText=this.value"></div>
            <div class="field"><label>Link Botão Principal</label><input value="${esc(h.ctaLink)}" onchange="siteData.hero.ctaLink=this.value" placeholder="#download ou https://..."></div>
            <div class="field"><label>Texto Botão Secundário</label><input value="${esc(h.secondaryText)}" onchange="siteData.hero.secondaryText=this.value"></div>
            <div class="field"><label>Link Botão Secundário</label><input value="${esc(h.secondaryLink)}" onchange="siteData.hero.secondaryLink=this.value"></div>
        </div>
    `;
}

function renderDesignEditor(area) {
    const d = siteData.design || {};
    area.innerHTML = `
        <div class="section-block">
            <h3>🎨 Ícone do Site (Favicon)</h3>
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Aparece na aba do browser e no ícone do atalho.</p>
            <div style="display:flex;gap:16px;align-items:start;">
                <div style="flex:1;">
                    <div class="field"><label>URL da imagem (HTTPS)</label><input id="favicon-url" value="${esc(d.favicon || '')}" placeholder="https://exemplo.com/logo.png" onchange="siteData.design.favicon=this.value"></div>
                    <div style="margin-top:8px;"><button class="btn btn-outline" onclick="uploadDesignImage('favicon')">📤 Ou fazer upload</button></div>
                </div>
                <div id="favicon-preview" style="width:64px;height:64px;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface);overflow:hidden;">
                    ${d.favicon ? `<img src="${d.favicon}" style="width:100%;height:100%;object-fit:contain;">` : '<span style="font-size:24px;">🌐</span>'}
                </div>
            </div>
        </div>
        <div class="section-block">
            <h3>🖼️ Logo Principal</h3>
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Aparece na sidebar, ecrã de login e loading.</p>
            <div style="display:flex;gap:16px;align-items:start;">
                <div style="flex:1;">
                    <div class="field"><label>URL da imagem (HTTPS)</label><input id="logo-url" value="${esc(d.logo || '')}" placeholder="https://exemplo.com/logo.png" onchange="siteData.design.logo=this.value"></div>
                    <div style="margin-top:8px;"><button class="btn btn-outline" onclick="uploadDesignImage('logo')">📤 Ou fazer upload</button></div>
                </div>
                <div id="logo-preview" style="width:120px;height:64px;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface);overflow:hidden;">
                    ${d.logo ? `<img src="${d.logo}" style="max-width:100%;max-height:100%;object-fit:contain;">` : '<span style="font-size:24px;">🏢</span>'}
                </div>
            </div>
        </div>
        <div class="section-block">
            <h3>🎨 Cor de Destaque</h3>
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Cor principal usada em botões, links e destaques.</p>
            <div class="field"><label>Cor Hex</label>
                <div style="display:flex;gap:12px;align-items:center;">
                    <input type="color" value="${d.accentColor || '#6366f1'}" onchange="siteData.design.accentColor=this.value;this.nextElementSibling.value=this.value" style="width:50px;height:40px;border:none;cursor:pointer;">
                    <input value="${esc(d.accentColor || '#6366f1')}" onchange="siteData.design.accentColor=this.value;this.previousElementSibling.value=this.value" style="flex:1;">
                </div>
            </div>
        </div>
        <div class="section-block">
            <h3>⬇️ Link Download Instalador</h3>
            <div class="field"><label>URL do .exe</label><input value="${esc(d.downloadUrl || '')}" placeholder="https://github.com/.../releases/..." onchange="siteData.design.downloadUrl=this.value"></div>
        </div>
    `;
}

function uploadDesignImage(field) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = () => {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 500000) { alert('Imagem muito grande (máx 500KB). Comprime-a primeiro.'); return; }
        const reader = new FileReader();
        reader.onload = () => {
            siteData.design = siteData.design || {};
            siteData.design[field] = reader.result;
            if (field === 'favicon') {
                document.getElementById('favicon-preview').innerHTML = `<img src="${reader.result}" style="width:100%;height:100%;object-fit:contain;">`;
                document.getElementById('favicon-url').value = reader.result.substring(0, 50) + '...';
            } else {

document.getElementById('image-upload').addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    if (!siteData.gallery) siteData.gallery = [];
    let loaded = 0;
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
            siteData.gallery.push(ev.target.result);
            loaded++;
            if (loaded === files.length) {
                renderTab();
                showSaveIndicator('Imagens adicionadas');
            }
        };
        reader.readAsDataURL(file);
    });
    e.target.value = '';
});

let sliderInterval;
function startSlider() {
    clearInterval(sliderInterval);
    let idx = 0;
    const preview = document.getElementById('slider-preview');
    if (!preview) return;
    const imgs = preview.querySelectorAll('img');
    const dots = preview.querySelectorAll('.dot');
    if (imgs.length === 0) return;
    sliderInterval = setInterval(() => {
        imgs[idx].classList.remove('active');
        dots[idx].classList.remove('active');
        idx = (idx + 1) % imgs.length;
        imgs[idx].classList.add('active');
        dots[idx].classList.add('active');
    }, 3000);
}

function goToSlide(i) {
    clearInterval(sliderInterval);
    const preview = document.getElementById('slider-preview');
    if (!preview) return;
    const imgs = preview.querySelectorAll('img');
    const dots = preview.querySelectorAll('.dot');
    imgs.forEach(img => img.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    imgs[i].classList.add('active');
    dots[i].classList.add('active');
    startSlider();
}

async function publishAll() {

}

async function approvePurchase(id) {
    const snap = await db.ref('extension_purchases/' + id).once('value');
    const p = snap.val();
    if (!p) return;

    await db.ref('extension_purchases/' + id).update({ status: 'approved', processedAt: Date.now() });
    await db.ref('user_extensions/' + p.userId + '/' + p.extId).set(true);

    fetch('/api/admin/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            to: p.userEmail,
            subject: `Extensão "${p.extName}" ativada — S&O+ Ultra Workspace`,
            body: `Olá ${p.userName},\n\nO teu pagamento da extensão "${p.extName}" (${p.extPrice}) foi confirmado com sucesso!\n\nA extensão já está ativa na tua conta. Abre o S&O+ Ultra Workspace e acede à aba "${p.extName}" para começar a usar.\n\nObrigado pela compra!\n\nEquipa S&O+ Ultra Workspace`
        })
    }).catch(() => {});

    showToast('Pedido aprovado! Email enviado.');
    renderPedidos(document.getElementById('editor-content'));
    updatePedidosBadge();
}

async function rejectPurchase(id) {
    const snap = await db.ref('extension_purchases/' + id).once('value');
    const p = snap.val();
    if (!p) return;

    await db.ref('extension_purchases/' + id).update({ status: 'rejected', processedAt: Date.now() });

    fetch('/api/admin/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            to: p.userEmail,
            subject: `Pagamento não processado — S&O+ Ultra Workspace`,
            body: `Olá ${p.userName},\n\nInfelizmente o pagamento da extensão "${p.extName}" (${p.extPrice}) não foi efetuado corretamente.\n\nPodes tentar novamente na aba Loja do S&O+ Ultra Workspace.\n\nSe precisares de ajuda, responde a este email.\n\nEquipa S&O+ Ultra Workspace`
        })
    }).catch(() => {});

    showToast('Pedido rejeitado. Email enviado.');
    renderPedidos(document.getElementById('editor-content'));
    updatePedidosBadge();
}

function listenPedidos() {
    db.ref('extension_purchases').on('value', () => updatePedidosBadge());
}

// ════════════════════════════════════════════════════════════
//   DATABASE EXPLORER — IA + Árvore + Edição
// ════════════════════════════════════════════════════════════

const GEMINI_MODEL = 'gemini-3.1-flash-lite';
let dbTreeData = {};
let dbExpandedPaths = new Set();

function renderDatabase(area) {
    area.innerHTML = `
        <div class="section-block">
            <h3>🤖 Assistente IA da Base de Dados</h3>
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Pergunta em linguagem natural sobre os dados do Firebase. Ex: "quantos utilizadores existem?", "mostra os pedidos pendentes", "quais são os códigos de professor?"</p>
            <div class="db-search-box">
                <input id="db-ai-input" placeholder="Pergunta à IA sobre a base de dados..." onkeydown="if(event.key==='Enter')askDBAI()">
                <button onclick="askDBAI()">🤖 Perguntar</button>
            </div>
            <div class="db-ai-response" id="db-ai-response"></div>
        </div>
        <div class="section-block">
            <h3>📊 Resumo da Base de Dados</h3>
            <div class="db-stats" id="db-stats"></div>
        </div>
        <div class="section-block">
            <h3>🌳 Explorador de Dados <button class="btn btn-outline" onclick="refreshDBTree()" style="margin-left:auto;font-size:11px;">🔄 Atualizar</button></h3>
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Clica para expandir/colapsar. Clica no ícone ✏️ para editar. Alterações são guardadas imediatamente no Firebase.</p>
            <div class="db-tree" id="db-tree"><div style="color:var(--text-dim);padding:20px;">A carregar...</div></div>
        </div>
    `;
    refreshDBTree();
}

async function askDBAI() {
    const input = document.getElementById('db-ai-input');
    const resp = document.getElementById('db-ai-response');
    const q = input.value.trim();
    if (!q) return;
    resp.style.display = 'block';
    resp.innerHTML = '<div style="color:var(--text-dim);">⏳ A analisar a base de dados...</div>';

    let dbSummary = '';
    try {
        const snap = await db.ref('/').once('value');
        dbSummary = summarizeForAI(snap.val(), '', 0);
    } catch(e) {
        resp.innerHTML = `<div style="color:var(--danger);">Erro ao ler dados: ${e.message}</div>`;
        return;
    }

    try {
        const r = await fetch('/api/admin/ai-query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: `Tu és o assistente de administração de uma base de dados Firebase. Aqui está a estrutura e dados:\n\n${dbSummary}\n\n---\n\nPergunta do admin: "${q}"\n\nResponde de forma clara e organizada. Usa emojis e formatação. Se a pergunta for sobre dados específicos, mostra os valores. Se pedir uma ação, explica o que fazer.` })
        });
        const data = await r.json();
        if (data.erro) { resp.innerHTML = `<div style="color:var(--danger);">❌ ${data.erro}</div>`; return; }
        const txt = data.resposta || 'Sem resposta.';
        resp.innerHTML = `<div style="white-space:pre-wrap;line-height:1.7;">${txt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<pre>$1</pre>')}</div>`;
    } catch(e) {
        resp.innerHTML = `<div style="color:var(--danger);">Erro de ligação: ${e.message}</div>`;
    }
}

function summarizeForAI(val, path, depth) {
    if (depth > 3) return '';
    if (val === null) return '';
    if (typeof val !== 'object') return `${path}: ${val}\n`;
    let out = '';
    const keys = Object.keys(val).slice(0, 50);
    for (const k of keys) {
        const v = val[k];
        const p = path ? `${path}.${k}` : k;
        if (typeof v === 'object' && v !== null) {
            const childCount = Object.keys(v).length;
            out += `${p} {${childCount} campos}\n`;
            if (childCount < 20) out += summarizeForAI(v, p, depth + 1);
        } else {
            out += `${p}: ${v}\n`;
        }
    }
    return out;
}

async function refreshDBTree() {
    const tree = document.getElementById('db-tree');
    tree.innerHTML = '<div style="color:var(--text-dim);padding:10px;">🔄 A carregar...</div>';
    try {
        const snap = await db.ref('/').once('value');
        dbTreeData = snap.val() || {};
        renderDBStats(dbTreeData);
        tree.innerHTML = renderDBNode(dbTreeData, 'root', '', 0);
    } catch(e) {
        tree.innerHTML = `<div style="color:var(--danger);padding:10px;">Erro: ${e.message}</div>`;
    }
}

function renderDBStats(data) {
    const stats = document.getElementById('db-stats');
    const count = countNodes(data);
    const topLevel = Object.keys(data).length;
    const totalStr = JSON.stringify(data).length;
    stats.innerHTML = `
        <div class="db-stat"><div class="label">Nós totais</div><div class="value">${count}</div></div>
        <div class="db-stat"><div class="label">Top Level</div><div class="value">${topLevel}</div></div>
        <div class="db-stat"><div class="label">Tamanho</div><div class="value">${formatBytes(totalStr.length)}</div></div>
        <div class="db-stat"><div class="label">Caminhos expandidos</div><div class="value">${dbExpandedPaths.size}</div></div>
    `;
}

function countNodes(obj) {
    if (!obj || typeof obj !== 'object') return 1;
    let c = 1;
    for (const k of Object.keys(obj)) c += countNodes(obj[k]);
    return c;
}

function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function getDataType(val) {
    if (val === null) return 'null';
    if (Array.isArray(val)) return 'array';
    return typeof val;
}

function renderDBNode(val, key, parentPath, depth) {
    const path = parentPath ? `${parentPath}/${key}` : key;
    const type = getDataType(val);

    if (type === 'object' && val !== null) {
        const isExpanded = dbExpandedPaths.has(path);
        const childKeys = Object.keys(val);
        const preview = childKeys.slice(0, 3).join(', ');
        return `
            <div class="db-node">
                <div class="db-node-header" onclick="toggleDBNode('${path.replace(/'/g, "\\'")}')">
                    <span style="font-size:12px;color:var(--text-dim);">${isExpanded ? '▼' : '▶'}</span>
                    <span class="db-node-key">${key}</span>
                    <span class="db-node-type db-type-object">objeto</span>
                    <span class="db-node-value">${childKeys.length} campos: ${preview}${childKeys.length > 3 ? '...' : ''}</span>
                    <span class="db-node-meta">${childKeys.length} filhos</span>
                    <button class="db-edit-btn" onclick="event.stopPropagation();deleteDBNode('${path.replace(/'/g, "\\'")}')">🗑️</button>
                </div>
                ${isExpanded ? `<div class="db-tree">${childKeys.map(k => renderDBNode(val[k], k, path, depth + 1)).join('')}</div>` : ''}
            </div>`;
    }

    const displayVal = val === null ? 'null' : typeof val === 'string' ? `"${val.substring(0, 100)}${val.length > 100 ? '...' : ''}"` : JSON.stringify(val);
    return `
        <div class="db-node">
            <div class="db-node-header">
                <span style="width:12px;"></span>
                <span class="db-node-key">${key}</span>
                <span class="db-node-type db-type-${type}">${type}</span>
                <span class="db-node-value" id="val-${path.replace(/[^a-zA-Z0-9]/g, '_')}">${displayVal}</span>
                <button class="db-edit-btn" onclick="event.stopPropagation();editDBNode('${path.replace(/'/g, "\\'")}', this)">✏️</button>
                <button class="db-edit-btn" onclick="event.stopPropagation();deleteDBNode('${path.replace(/'/g, "\\'")}')">🗑️</button>
            </div>
        </div>`;
}

function toggleDBNode(path) {
    if (dbExpandedPaths.has(path)) dbExpandedPaths.delete(path);
    else dbExpandedPaths.add(path);
    refreshDBTree();
}

async function editDBNode(path, btn) {
    const current = await db.ref(path).once('value');
    const val = current.val();
    const display = typeof val === 'string' ? val : JSON.stringify(val);
    const row = btn.closest('.db-node-header');
    const valSpan = row.querySelector('.db-node-value');
    const origHTML = valSpan.innerHTML;
    valSpan.innerHTML = `<input class="db-edit-input" value="${display.replace(/"/g, '&quot;')}" onkeydown="if(event.key==='Enter')saveDBNode('${path.replace(/'/g, "\\'")}', this)" onblur="saveDBNode('${path.replace(/'/g, "\\'")}', this)">`;
    valSpan.querySelector('input').focus();
}

async function saveDBNode(path, input) {
    let val = input.value;
    try { val = JSON.parse(val); } catch(e) { /* string */ }
    try {
        await db.ref(path).set(val);
        showToast(`✅ ${path} atualizado`);
        refreshDBTree();
    } catch(e) {
        showToast(`❌ Erro: ${e.message}`);
    }
}

async function deleteDBNode(path) {
    if (!confirm(`Eliminar "${path}" e todos os seus dados?`)) return;
    try {
        await db.ref(path).remove();
        dbExpandedPaths.delete(path);
        showToast(`🗑️ ${path} eliminado`);
        refreshDBTree();
    } catch(e) {
        showToast(`❌ Erro: ${e.message}`);
    }
}

async function updatePedidosBadge() {
    const snap = await db.ref('extension_purchases').orderByChild('status').equalTo('pending').once('value');
    const count = snap.numChildren();
    const badge = document.getElementById('pedidos-badge');
    if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'inline';
    } else {
        badge.style.display = 'none';
    }
}

function showToast(msg) {
    const el = document.getElementById('save-indicator');
    el.innerHTML = '✅ ' + msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

window.addEventListener('beforeunload', e => { e.preventDefault(); });
</script>
