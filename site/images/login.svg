<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e24"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="glow4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <radialGradient id="orb4" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <circle cx="600" cy="300" r="350" fill="url(#orb4)"/>
  <!-- Login card -->
  <rect x="380" y="110" width="440" height="420" rx="20" fill="url(#card4)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Logo -->
  <circle cx="600" cy="185" r="32" fill="none" stroke="url(#glow4)" stroke-width="2.5"/>
  <text x="600" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="url(#glow4)">S&amp;O+</text>
  <text x="600" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Bem-vindo de volta</text>
  <text x="600" y="264" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#71717a">Entra na tua conta para continuar</text>
  <!-- Email field -->
  <rect x="420" y="290" width="360" height="44" rx="10" fill="#09090b" stroke="#333" stroke-width="1"/>
  <text x="440" y="317" font-family="Inter, sans-serif" font-size="13" fill="#52525b">📧 Email</text>
  <!-- Password field -->
  <rect x="420" y="346" width="360" height="44" rx="10" fill="#09090b" stroke="#333" stroke-width="1"/>
  <text x="440" y="373" font-family="Inter, sans-serif" font-size="13" fill="#52525b">🔒 ••••••••</text>
  <!-- Login button -->
  <rect x="420" y="406" width="360" height="44" rx="10" fill="url(#glow4)"/>
  <text x="600" y="433" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Entrar</text>
  <!-- Google button -->
  <rect x="420" y="460" width="360" height="44" rx="10" fill="transparent" stroke="#333" stroke-width="1"/>
  <text x="580" y="487" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#a1a1aa">Continuar com Google</text>
  <!-- Register link -->
  <text x="600" y="522" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#71717a">Não tens conta? <tspan fill="#a78bfa" font-weight="600">Criar conta</tspan></text>
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="60" fill="#6366f1" opacity="0.03"/>
  <circle cx="1100" cy="530" r="80" fill="#8b5cf6" opacity="0.03"/>
</svg>
