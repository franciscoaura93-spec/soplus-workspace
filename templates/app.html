<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&O+ Ultra Workspace</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/app.css?v=2.2">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-orb"></div>
        <div class="loader-text">S&O+<span>Ultra</span></div>
    </div>

    <div id="app" style="display:none;">
        <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-logo"><h1>S&O+</h1><small>Ultra Workspace</small></div>
            <div class="sidebar-nav" id="nav-container"></div>
            <div class="sidebar-footer">
                <div class="user-pill" id="user-pill">
                    <div class="user-avatar" id="user-avatar">?</div>
                    <div class="user-info">
                        <div class="user-name" id="user-name">...</div>
                        <div class="user-role" id="user-role">...</div>
                    </div>
                </div>
            </div>
        </nav>
        <div class="main-content">
            <div class="topbar">
                <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
                <span class="topbar-title" id="page-title">Dashboard</span>
                <div class="topbar-actions" id="topbar-actions"></div>
            </div>
            <div class="scroll-area" id="content-area"></div>
        </div>
    </div>

    <!-- AI FAB -->
    <div id="ai-fab" onclick="toggleAI()">✨</div>
    <div id="ai-panel">
        <div class="ai-header"><span>🤖 IA S&O+ Ultra</span><span class="ai-close" onclick="toggleAI()">✖</span></div>
        <div class="ai-messages" id="ai-chat">
            <div class="ai-msg">Olá! Sou o assistente IA do S&O+. Pergunta-me qualquer coisa!</div>
        </div>
        <div class="ai-input-wrap">
            <input type="text" class="form-input" id="ai-in" placeholder="Escreve..." onkeypress="if(event.key==='Enter')askAI()" style="flex:1;">
            <button class="btn btn-ai" onclick="askAI()">Ir</button>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="cursor-glow-trail" id="cursorGlow"></div>
    <canvas id="particleCanvas"></canvas>

    <script src="/static/js/firebase-config.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
    db.ref('site_content/design').on('value', snap => {
        const d = snap.val();
        if (!d) return;
        if (d.favicon) {
            let link = document.querySelector("link[rel~='icon']");
            if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
            link.href = d.favicon;
            link.type = 'image/png';
        }
        if (d.logo) {
            const sb = document.querySelector('.sidebar-logo');
            if (sb) sb.innerHTML = '<img src="' + d.logo + '" alt="Logo" style="height:36px;width:auto;"><small>Ultra Workspace</small>';
            const ld = document.querySelector('.loader-text');
            if (ld) ld.innerHTML = '<img src="' + d.logo + '" alt="Logo" style="height:48px;width:auto;"><span>Ultra</span>';
        }
        if (d.accentColor) {
            document.documentElement.style.setProperty('--primary', d.accentColor);
            const r = parseInt(d.accentColor.slice(1,3),16), g = parseInt(d.accentColor.slice(3,5),16), b = parseInt(d.accentColor.slice(5,7),16);
            document.documentElement.style.setProperty('--primary-rgb', r+','+g+','+b);
        }
    });
    </script>
    <script src="/static/js/app.js?v=2.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs/loader.js"></script>
</body>
</html>
