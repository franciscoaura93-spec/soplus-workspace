<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&O+ | Entrar</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        body { display:flex; justify-content:center; align-items:center; cursor:auto; min-height:100vh; }
        .auth-bg { position:fixed; inset:0; z-index:0; background:var(--bg);
            background: radial-gradient(ellipse at 20% 50%,rgba(37,99,235,0.08) 0%,transparent 50%),
            radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.06) 0%,transparent 50%), var(--bg);
        }
        .auth-card {
            background:rgba(255,255,255,0.02); backdrop-filter:blur(40px) saturate(1.5);
            border:1px solid var(--border); border-radius:28px; padding:48px 42px; width:460px; max-width:95vw;
            text-align:center; position:relative; z-index:1;
            animation:containerIn 1s cubic-bezier(.16,1,.3,1);
            box-shadow:0 0 80px rgba(37,99,235,0.06), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        @keyframes containerIn { from{opacity:0;transform:translateY(50px) scale(.94);filter:blur(8px)} to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)} }
        .auth-logo-wrap { position:relative; display:inline-block; margin-bottom:8px; }
        .auth-logo { font-size:48px; font-weight:900; background:var(--gradient-flow); background-size:300% 300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:gradientFlow 4s ease infinite,logoIn .8s cubic-bezier(.16,1,.3,1) .2s both; }
        @keyframes logoIn { from{opacity:0;transform:scale(.5) rotateX(40deg)} to{opacity:1;transform:scale(1) rotateX(0)} }
        .logo-glow { position:absolute; top:50%; left:50%; width:120px; height:40px; background:rgba(37,99,235,0.25); filter:blur(30px); border-radius:50%; transform:translate(-50%,-50%); animation:glow 3s ease-in-out infinite; }
        .auth-sub { color:var(--text-light); font-size:12px; margin-bottom:36px; letter-spacing:2px; text-transform:uppercase; }
        .auth-field { margin-bottom:16px; text-align:left; }
        .auth-field label { display:block; font-size:11px; font-weight:700; color:rgba(255,255,255,.4); margin-bottom:7px; text-transform:uppercase; letter-spacing:1px; }
        .auth-field input, .auth-field select { width:100%; padding:14px 18px; border-radius:12px; border:1.5px solid rgba(255,255,255,.06); background:rgba(255,255,255,.03); color:white; font-size:15px; outline:none; transition:all .4s; font-family:inherit; }
        .auth-field input::placeholder { color:rgba(255,255,255,.2); }
        .auth-field input:focus { border-color:rgba(37,99,235,.5); background:rgba(37,99,235,.05); box-shadow:0 0 0 4px rgba(37,99,235,.1); }
        .auth-btn { width:100%; padding:15px; border-radius:14px; border:none; font-weight:700; font-size:15px; cursor:pointer; margin-top:8px; transition:all .4s cubic-bezier(.16,1,.3,1); font-family:inherit; position:relative; overflow:hidden; }
        .auth-btn-primary { background:linear-gradient(135deg,#2563EB,#7C3AED); color:white; box-shadow:0 4px 20px rgba(37,99,235,.3); }
        .auth-btn-primary:hover { transform:translateY(-3px) scale(1.01); box-shadow:0 8px 40px rgba(37,99,235,.5); }
        .auth-btn-google {
            width:100%; padding:14px 20px; border-radius:14px; border:1.5px solid rgba(255,255,255,.06);
            background:rgba(255,255,255,.03); color:white; font-weight:600; font-size:14px;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px;
            transition:all .4s cubic-bezier(.16,1,.3,1); font-family:inherit;
        }
        .auth-btn-google:hover { border-color:rgba(66,133,244,.3); transform:translateY(-2px); box-shadow:0 8px 30px rgba(66,133,244,.15); }
        .auth-btn-guest { background:transparent; color:rgba(255,255,255,.35); border:1px solid rgba(255,255,255,.06); }
        .auth-btn-guest:hover { background:rgba(255,255,255,.03); color:rgba(255,255,255,.6); }
        .auth-btn-back { background:transparent; color:rgba(255,255,255,.4); border:1px solid rgba(255,255,255,.06); font-size:13px; padding:10px; }
        .auth-btn-back:hover { background:rgba(255,255,255,.03); color:rgba(255,255,255,.7); }
        .divider { display:flex; align-items:center; gap:16px; margin:22px 0; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent); }
        .divider span { font-size:11px; color:rgba(255,255,255,.25); text-transform:uppercase; letter-spacing:1px; }
        .auth-switch { margin-top:24px; font-size:13px; color:rgba(255,255,255,.3); }
        .auth-switch a { color:#60A5FA; text-decoration:none; font-weight:600; cursor:pointer; }
        .auth-error { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); color:#FCA5A5; padding:12px 16px; border-radius:12px; font-size:13px; margin-bottom:16px; display:none; text-align:left; }
        .auth-success { background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.2); color:#6EE7B7; padding:12px 16px; border-radius:12px; font-size:13px; margin-bottom:16px; display:none; text-align:left; }
        .role-cards { display:flex; gap:12px; margin-bottom:20px; }
        .role-card { flex:1; padding:20px 12px; border-radius:16px; border:2px solid rgba(255,255,255,.06); background:rgba(255,255,255,.02); cursor:pointer; transition:all .3s; text-align:center; }
        .role-card:hover { border-color:rgba(37,99,235,.3); background:rgba(37,99,235,.03); }
        .role-card.selected { border-color:#2563EB; background:rgba(37,99,235,.08); box-shadow:0 0 20px rgba(37,99,235,.15); }
        .role-card .role-icon { font-size:32px; margin-bottom:8px; }
        .role-card .role-name { font-weight:700; font-size:14px; color:rgba(255,255,255,.8); }
        .reg-extra { display:none; }
        .reg-extra.show { display:block; }
        .google-icon svg { width:20px; height:20px; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    </style>
</head>
<body>
    <div class="auth-bg"></div>
    <div class="auth-card">
        <div class="auth-logo-wrap">
            <div class="logo-glow"></div>
            <div class="auth-logo">S&O+</div>
        </div>
        <div class="auth-sub">Ultra Workspace 2026</div>

        <div id="auth-error" class="auth-error"></div>
        <div id="auth-success" class="auth-success"></div>

        <!-- ═══ LOGIN SCREEN ═══ -->
        <div id="screen-login">
            <button class="auth-btn auth-btn-google" onclick="doGoogleLogin()">
                <span class="google-icon"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></span>
                Entrar com Google
            </button>

            <div class="divider"><span>ou</span></div>

            <form id="login-form" onsubmit="doEmailLogin(event)">
                <div class="auth-field"><label>Email</label><input type="email" id="login-email" placeholder="teu@email.com" required></div>
                <div class="auth-field"><label>Palavra-passe</label><input type="password" id="login-pass" placeholder="••••••••" required></div>
                <button type="submit" class="auth-btn auth-btn-primary">Entrar</button>
            </form>

            <button class="auth-btn auth-btn-guest" onclick="doGuestLogin()">Modo Convidado</button>

            <div class="auth-switch">
                Não tens conta? <a onclick="showScreen('screen-register')">Registar agora</a>
            </div>
        </div>

        <!-- ═══ REGISTER SCREEN ═══ -->
        <div id="screen-register" style="display:none;">
            <div class="divider"><span>criar conta</span></div>

            <div class="auth-field"><label>Nome completo</label><input type="text" id="reg-nome" placeholder="Ex: João Silva"></div>
            <div class="auth-field"><label>Email</label><input type="email" id="reg-email" placeholder="teu@email.com"></div>
            <div class="auth-field"><label>Palavra-passe</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres"></div>

            <div class="auth-field"><label>Que és?</label></div>
            <div class="role-cards">
                <div class="role-card" onclick="selectRole('aluno')" id="role-aluno">
                    <div class="role-icon">🎓</div>
                    <div class="role-name">Aluno</div>
                </div>
                <div class="role-card" onclick="selectRole('professor')" id="role-professor">
                    <div class="role-icon">👨‍🏫</div>
                    <div class="role-name">Professor</div>
                </div>
            </div>
            <input type="hidden" id="reg-role" value="">

            <!-- ALUNO fields -->
            <div id="aluno-fields" class="reg-extra">
                <div class="auth-field"><label>Turma</label><input type="text" id="reg-turma" placeholder="Ex: 10A"></div>
                <div class="form-row">
                    <div class="auth-field"><label>Ano</label><input type="number" id="reg-ano" placeholder="Ex: 10" min="1" max="12"></div>
                    <div class="auth-field"><label>Idade</label><input type="number" id="reg-idade" placeholder="Ex: 15" min="8" max="25"></div>
                </div>
            </div>

            <!-- PROFESSOR fields -->
            <div id="professor-fields" class="reg-extra">
                <div class="auth-field">
                    <label>Código de Professor</label>
                    <input type="password" id="reg-codigo-prof" placeholder="Insere o código de verificação">
                </div>
                <div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:-10px;margin-bottom:16px;">
                    Solicita o código ao administrador
                </div>
                <div class="auth-field">
                    <label>As Tuas Turmas</label>
                    <input type="text" id="reg-turmas-prof" placeholder="Ex: 10A, 10B, 11A">
                </div>
                <div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:-10px;margin-bottom:16px;">
                    Separa as turmas por vírgula
                </div>
            </div>

            <button id="reg-btn" class="auth-btn auth-btn-primary" onclick="doRegister()">Criar Conta</button>

            <div class="auth-switch" style="margin-top:16px;">
                Já tens conta? <a onclick="showScreen('screen-login')">Entrar</a>
            </div>
        </div>
    </div>

    <script src="/static/js/firebase-config.js"></script>
    <script>
        const PROF_CODE = 'professors&o';
        let selectedRole = '';
        let isGoogleUser = false;
        let needsProfile = false;
        let googleCred = null;

        auth.onAuthStateChanged(user => {
            if (user && !isGoogleUser && !needsProfile) {
                if (new URLSearchParams(window.location.search).get('needProfile')) {
                    needsProfile = true;
                    showScreen('screen-register');
                    const email = user.email || '';
                    document.getElementById('reg-nome').value = email.split('@')[0];
                    document.getElementById('reg-email').value = email;
                    document.getElementById('reg-email').disabled = true;
                    document.getElementById('reg-email').style.opacity = '0.5';
                    document.getElementById('reg-pass').parentElement.style.display = 'none';
                    document.getElementById('reg-pass').required = false;
                    document.getElementById('reg-btn').textContent = 'Completar Registo';
                    showSuccess('Primeira vez! Completa o teu perfil.');
                    return;
                }
                window.location.href = '/app';
            }
        });

        function showScreen(id) {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('screen-register').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            hideErrors();
        }

        function showError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('auth-success').style.display = 'none';
            setTimeout(() => el.style.display = 'none', 6000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('auth-success');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('auth-error').style.display = 'none';
        }

        function hideErrors() {
            document.getElementById('auth-error').style.display = 'none';
            document.getElementById('auth-success').style.display = 'none';
        }

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('reg-role').value = role;
            document.getElementById('role-aluno').classList.toggle('selected', role === 'aluno');
            document.getElementById('role-professor').classList.toggle('selected', role === 'professor');
            document.getElementById('aluno-fields').classList.toggle('show', role === 'aluno');
            document.getElementById('professor-fields').classList.toggle('show', role === 'professor');
        }

        async function doGoogleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                googleCred = await auth.signInWithPopup(provider);
                const snap = await firebase.database().ref('users/' + googleCred.user.uid).once('value');
                if (!snap.val()) {
                    isGoogleUser = true;
                    showScreen('screen-register');
                    document.getElementById('reg-nome').value = googleCred.user.displayName || '';
                    document.getElementById('reg-email').value = googleCred.user.email || '';
                    document.getElementById('reg-email').disabled = true;
                    document.getElementById('reg-email').style.opacity = '0.5';
                    document.getElementById('reg-pass').style.display = 'none';
                    document.getElementById('reg-pass').required = false;
                    document.getElementById('reg-pass').parentElement.style.display = 'none';
                    document.getElementById('reg-btn').textContent = 'Completar Registo';
                    showSuccess('Conta Google criada! Completa o teu perfil.');
                    return;
                }
                window.location.href = '/app';
            } catch(e) {
                if (e.code === 'auth/popup-closed-by-user') return;
                showError('Erro Google: ' + e.message);
            }
        }

        async function doEmailLogin(e) {
            e.preventDefault();
            hideErrors();
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;

            try {
                const cred = await auth.signInWithEmailAndPassword(email, pass);
                const snap = await firebase.database().ref('users/' + cred.user.uid).once('value');
                if (!snap.val()) {
                    needsProfile = true;
                    showScreen('screen-register');
                    document.getElementById('reg-nome').value = email.split('@')[0];
                    document.getElementById('reg-email').value = email;
                    document.getElementById('reg-email').disabled = true;
                    document.getElementById('reg-email').style.opacity = '0.5';
                    document.getElementById('reg-pass').parentElement.style.display = 'none';
                    document.getElementById('reg-pass').required = false;
                    document.getElementById('reg-btn').textContent = 'Completar Registo';
                    showSuccess('Primeira vez! Completa o teu perfil.');
                    return;
                }
                window.location.href = '/app';
            } catch(e) {
                if (e.code === 'auth/user-not-found') {
                    isGoogleUser = false;
                    showScreen('screen-register');
                    document.getElementById('reg-email').value = email;
                    document.getElementById('reg-btn').textContent = 'Criar Conta';
                    showSuccess('Email não encontrado. Cria a tua conta!');
                    return;
                }
                if (e.code === 'auth/wrong-password') {
                    showError('Palavra-passe incorreta.');
                    return;
                }
                if (e.code === 'auth/invalid-credential') {
                    isGoogleUser = false;
                    showScreen('screen-register');
                    document.getElementById('reg-email').value = email;
                    document.getElementById('reg-btn').textContent = 'Criar Conta';
                    showSuccess('Email não encontrado. Cria a tua conta!');
                    return;
                }
                showError('Erro: ' + e.message);
            }
        }

        async function doGuestLogin() {
            try {
                const cred = await auth.signInAnonymously();
                const snap = await firebase.database().ref('users/' + cred.user.uid).once('value');
                if (!snap.val()) {
                    await firebase.database().ref('users/' + cred.user.uid).set({
                        nome: 'Convidado', email: '', role: 'aluno', turma: '',
                        ano: '', idade: '', photoURL: '', createdAt: Date.now()
                    });
                }
                window.location.href = '/app';
            } catch(e) { showError('Erro: ' + e.message); }
        }

        async function doRegister() {
            hideErrors();
            const nome = document.getElementById('reg-nome').value.trim();
            const role = selectedRole;

            if (!nome) return showError('Insere o teu nome.');
            if (!role) return showError('Seleciona se és Aluno ou Professor.');

            if (isGoogleUser && googleCred) {
                const uid = googleCred.user.uid;
                const email = googleCred.user.email || '';
                const photoURL = googleCred.user.photoURL || '';

                if (role === 'aluno') {
                    const turma = document.getElementById('reg-turma').value.trim();
                    const ano = document.getElementById('reg-ano').value.trim();
                    const idade = document.getElementById('reg-idade').value.trim();
                    if (!turma) return showError('Insere a tua turma.');
                    if (!ano) return showError('Insere o ano.');

                    await firebase.database().ref('users/' + uid).set({
                        nome, email, role: 'aluno', turma,
                        ano: parseInt(ano), idade: idade ? parseInt(idade) : '',
                        photoURL, createdAt: Date.now()
                    });
                    window.location.href = '/app';
                }

                if (role === 'professor') {
                    const codigo = document.getElementById('reg-codigo-prof').value.trim();
                    if (codigo !== PROF_CODE) return showError('Código de professor incorreto.');
                    const turmas = document.getElementById('reg-turmas-prof').value.trim();

                    await firebase.database().ref('users/' + uid).set({
                        nome, email, role: 'professor', turma: '', turmas, ano: '', idade: '',
                        photoURL, createdAt: Date.now()
                    });
                    window.location.href = '/app';
                }
                return;
            }

            if (needsProfile && auth.currentUser) {
                const uid = auth.currentUser.uid;
                const email = auth.currentUser.email || '';

                if (role === 'aluno') {
                    const turma = document.getElementById('reg-turma').value.trim();
                    const ano = document.getElementById('reg-ano').value.trim();
                    const idade = document.getElementById('reg-idade').value.trim();
                    if (!turma) return showError('Insere a tua turma.');
                    if (!ano) return showError('Insere o ano.');

                    await firebase.database().ref('users/' + uid).set({
                        nome, email, role: 'aluno', turma,
                        ano: parseInt(ano), idade: idade ? parseInt(idade) : '',
                        photoURL: '', createdAt: Date.now()
                    });
                    window.location.href = '/app';
                }

                if (role === 'professor') {
                    const codigo = document.getElementById('reg-codigo-prof').value.trim();
                    if (codigo !== PROF_CODE) return showError('Código de professor incorreto.');
                    const turmas = document.getElementById('reg-turmas-prof').value.trim();

                    await firebase.database().ref('users/' + uid).set({
                        nome, email, role: 'professor', turma: '', turmas, ano: '', idade: '',
                        photoURL: '', createdAt: Date.now()
                    });
                    window.location.href = '/app';
                }
                return;
            }

            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            if (!email) return showError('Insere o teu email.');
            if (!pass || pass.length < 6) return showError('Palavra-passe: mínimo 6 caracteres.');

            if (role === 'aluno') {
                const turma = document.getElementById('reg-turma').value.trim();
                const ano = document.getElementById('reg-ano').value.trim();
                const idade = document.getElementById('reg-idade').value.trim();
                if (!turma) return showError('Insere a tua turma.');
                if (!ano) return showError('Insere o ano.');

                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, pass);
                    await firebase.database().ref('users/' + cred.user.uid).set({
                        nome, email, role: 'aluno', turma,
                        ano: parseInt(ano), idade: idade ? parseInt(idade) : '',
                        photoURL: '', createdAt: Date.now()
                    });
                    window.location.href = '/app';
                } catch(e) {
                    if (e.code === 'auth/email-already-in-use') return showError('Este email já está registado. Faz login.');
                    showError('Erro: ' + e.message);
                }
            }

            if (role === 'professor') {
                const codigo = document.getElementById('reg-codigo-prof').value.trim();
                if (codigo !== PROF_CODE) return showError('Código de professor incorreto.');
                const turmas = document.getElementById('reg-turmas-prof').value.trim();

                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, pass);
                    await firebase.database().ref('users/' + cred.user.uid).set({
                        nome, email, role: 'professor', turma: '', turmas, ano: '', idade: '',
                        photoURL: '', createdAt: Date.now()
                    });
                    window.location.href = '/app';
                } catch(e) {
                    if (e.code === 'auth/email-already-in-use') return showError('Este email já está registado. Faz login.');
                    showError('Erro: ' + e.message);
                }
            }
        }
    </script>
</body>
</html>
