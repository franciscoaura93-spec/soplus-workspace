<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&O+ | Registar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            position: relative;
        }
        .bg-orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: #8B5CF6; top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #2563EB; bottom: -80px; left: -80px; animation-delay: 3s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-20px) scale(1.1); } }

        .auth-container {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            padding: 48px 40px; width: 420px; text-align: center;
            animation: authSlideIn 0.8s cubic-bezier(0.4,0,0.2,1); position: relative; z-index: 1;
        }
        @keyframes authSlideIn { from { opacity:0; transform: translateY(40px) scale(0.95); } to { opacity:1; transform: translateY(0) scale(1); } }

        .auth-logo { font-size: 42px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg, #2563EB, #8B5CF6, #EC4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-subtitle { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 32px; }

        .auth-field { margin-bottom: 14px; text-align: left; animation: fieldIn 0.5s ease-out forwards; opacity: 0; }
        .auth-field:nth-child(1) { animation-delay: 0.15s; }
        .auth-field:nth-child(2) { animation-delay: 0.2s; }
        .auth-field:nth-child(3) { animation-delay: 0.25s; }
        .auth-field:nth-child(4) { animation-delay: 0.3s; }
        .auth-field:nth-child(5) { animation-delay: 0.35s; }
        @keyframes fieldIn { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }

        .auth-field label { display: block; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .auth-field input, .auth-field select {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            color: white; font-size: 14px; outline: none; transition: all 0.3s; font-family: inherit;
        }
        .auth-field input::placeholder { color: rgba(255,255,255,0.3); }
        .auth-field input:focus, .auth-field select:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .auth-field select option { background: #1E293B; color: white; }

        .auth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .auth-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px;
            transition: all 0.3s; font-family: inherit;
        }
        .auth-btn-primary { background: linear-gradient(135deg, #2563EB, #7C3AED); color: white; animation-delay: 0.4s; }
        .auth-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37,99,235,0.4); }

        .auth-switch { margin-top: 18px; font-size: 13px; color: rgba(255,255,255,0.4); }
        .auth-switch a { color: #60A5FA; text-decoration: none; font-weight: 600; }

        .flash-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; padding: 10px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    <div class="auth-container">
        <div class="auth-logo">S&O+</div>
        <div class="auth-subtitle">Cria a tua conta</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}{% for msg in messages %}<div class="flash-msg">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="auth-field"><label>Nome Completo</label><input type="text" name="nome" placeholder="O teu nome" required></div>
            <div class="auth-field"><label>Email</label><input type="email" name="email" placeholder="teu@email.com" required></div>
            <div class="auth-field"><label>Palavra-passe</label><input type="password" name="password" placeholder="Mínimo 6 caracteres" required></div>
            <div class="auth-row">
                <div class="auth-field"><label>Função</label>
                    <select name="role"><option value="aluno">Aluno</option><option value="professor">Professor</option></select>
                </div>
                <div class="auth-field"><label>Turma</label><input type="text" name="turma" placeholder="Ex: 10A"></div>
            </div>
            <button type="submit" class="auth-btn auth-btn-primary">Criar Conta</button>
        </form>
        <div class="auth-switch">Já tens conta? <a href="/login">Entrar</a></div>
    </div>
</body>
</html>
